name: Deploy to Production

on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_MAIN_HOST_IP }}
          username: github_user
          key: ${{ secrets.SSH_MAIN_PRIVATE_KEY }}
          script: |
            cd /home/github_user/workspace/mini_rag
            git checkout master
            git pull
            sudo systemctl restart mini_rag.service
            echo "Waiting for the service to restart..."
            sleep 10

            for i in {1..6}; do
              if ss -tuln | grep -q ':80'; then
                echo "✅ Port 80 is now active."
                break
              else
                echo "⏳ Port 80 not ready yet. Retrying in 5 seconds..."
                sleep 5
              fi
            done

            if ! ss -tuln | grep -q ':80'; then
              echo "❌ Service failed to start on port 80"
              exit 1
            fi